steps:
  # Step 0: Install packages directly into the shared workspace directory
  - name: 'python:3.11-slim'
    entrypoint: 'pip'
    args: ['install', '-t', '/workspace/lib', 'requests', 'pandas', 'google-cloud-storage']

  # Step 1: Run your script with an environment variable pointing to that library directory
  - name: 'python:3.11-slim'
    entrypoint: 'python'
    env:
      - 'PYTHONPATH=/workspace/lib'
    args: ['test.py']

options:
  logging: CLOUD_LOGGING_ONLY